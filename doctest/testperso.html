<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="testperso.css">
    <title>Test de personnalité | AdoFutur</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <!--favicon -->
    <link rel="icon" type="image/x-icon" href="../ressourrces/favicon/android-chrome-192x192.png" />
</head>
<body>
     <!-- Barre de navigation -->
    <nav>
        <img src="../ressourrces/images/Blue and Black Minimalist Brand Logo (200 x 200 px) (Site Web).png"
            alt="Logo de AdoFutur" class="logo" />

        <!-- Menu -->
        <ul class="nav-links" id="navLinks">
            <li><a href="../index.html"><i class="fa-solid fa-angle-left"></i>Retour</a></li>
        </ul>
    </nav>

    <!-- ----------------------------------- -->

  <div class="question-container">
 
    <!-- Question -->
    <p class="question-text">
      Choisissez dans quelle mesure chaque énoncé vous correspond.
    </p>
 
    <!-- Choix -->
    <div class="choix-wrapper">
 
      <div class="choix-group">
        <!-- Cercles -->
        <div class="cercles0">
          <button class="cercle1 rouge"></button>
          <button class="cercle1 orange"></button>
          <button class="cercle1 gris"></button>
          <button class="cercle1 vert-clair"></button>
          <button class="cercle1 vert"></button>
        </div>
 
        <!-- Labels -->
        <div class="choix-labels">
          <span class="label-left">Pas du tout<br>d'accord</span>
          <span class="label-right">Tout à fait<br>d'accord</span>
        </div>
      </div>
 
    </div>
 
  </div>

   <!-- Liste des questions -->
  <div class="questions-liste">
 
    <!-- Question 1 -->
    <div class="question-card">
      <p class="question-texte">Explorer des idées qui ne me sont pas familières peut me plonger dans l'incertitude.</p>
      <div class="cercles1">
        <button class="cercle rouge"></button>
        <button class="cercle orange"></button>
        <button class="cercle gris"></button>
        <button class="cercle vert-clair"></button>
        <button class="cercle vert"></button>
      </div>
    </div>
 
    <!-- Question 2 -->
    <div class="question-card">
      <p class="question-texte">Je préfère structurer l'information.</p>
      <div class="cercles1">
        <button class="cercle rouge"></button>
        <button class="cercle orange"></button>
        <button class="cercle gris"></button>
        <button class="cercle vert-clair"></button>
        <button class="cercle vert"></button>
      </div>
    </div>
 
    <!-- Question 3 -->
    <div class="question-card">
      <p class="question-texte">Je préfère soutenir le travail d'équipe.</p>
      <div class="cercles1">
        <button class="cercle rouge"></button>
        <button class="cercle orange"></button>
        <button class="cercle gris"></button>
        <button class="cercle vert-clair"></button>
        <button class="cercle vert"></button>
      </div>
    </div>
 
  </div>
</body>
</html>
